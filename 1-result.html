<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎲 Ergebnis – Projekt 5-7 Rot</title>
  <!-- Preconnect für CDNs -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="projekt.css">

  <!-- Google Fonts: nicht render-blockierend laden -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap"></noscript>
 <script src="common.js" defer></script>
  <style>
    body {
      font-family: 'Comic Neue', sans-serif;
      padding: 2rem;
    }
    .prompt-box {
      white-space: pre-wrap;
      background-color: #f8f8f8;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      border: 1px solid #ddd;
    }
    .success-text {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title is-3">🎲 Euer Forscherfragen-Prompt</h1>

      <div class="box">
        <p class="subtitle">Jetzt kann es losgehen! Kopiert den Prompt und startet mit ChatGPT oder Fobizz.</p>
        <p class="success-text" id="copyStatus">✅ Prompt wurde generiert.</p>

        <div id="resultText" class="prompt-box">
          <!-- Prompt wird per JavaScript hier eingefügt -->
        </div>

        <div class="buttons is-centered mt-4">
          <button id="copyAndGoBtn" class="button is-link">🧠 Kopieren & zu ChatGPT</button>
          <button id="copyAndGoFobizzBtn" class="button is-info">📘 Kopieren & zu Fobizz</button>
        </div>

        <p id="statusMessage" class="subtitle mt-3 has-text-centered"></p>
      </div>

      <div class="has-text-centered mt-5">
        <a href="index.html" class="button is-light">⬅ Zurück zur Übersicht</a>
      </div>

      <footer class="content has-text-centered mt-6">
        <p>Erstellt von Louis Birk-von Brook • Lizenz: 
          <a href="https://creativecommons.org/publicdomain/zero/1.0/deed.de">CC0 1.0</a>
        </p>
      </footer>
    </div>
  </section>
</body>
</html>
